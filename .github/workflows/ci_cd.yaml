# ============================================================
# CI/CD Pipeline — AI-Powered Last Mile Delivery Automation
# Three stages: Quality → Build & Push (ECR) → Deploy (ECS Fargate)
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: ai-last-mile-delivery
  ECS_CLUSTER: last-mile-delivery-cluster
  ECS_SERVICE: last-mile-delivery-service
  ECS_TASK_DEFINITION: last-mile-delivery-task
  CONTAINER_NAME: last-mile-delivery-app

# ────────────────────────────────────────────────────────────
# Stage 1: Quality Assurance (lint + test)
# ────────────────────────────────────────────────────────────
jobs:
  quality:
    name: Quality Assurance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check src/ app.py main.py tests/

      - name: Check formatting with ruff
        run: ruff format --check src/ app.py main.py tests/

      - name: Run unit and integration tests
        run: pytest -m "unit or integration" --tb=short -q

  # ────────────────────────────────────────────────────────────
  # Stage 2: Build & Push Docker image to AWS ECR
  # Runs only on pushes to main (not on PRs)
  # ────────────────────────────────────────────────────────────
  build-push:
    name: Build & Push to ECR
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    outputs:
      image-uri: ${{ steps.build.outputs.image-uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "image-uri=${IMAGE_URI}" >> "${GITHUB_OUTPUT}"

  # ────────────────────────────────────────────────────────────
  # Stage 3: Deploy to AWS ECS Fargate
  # ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ECS Fargate
    needs: build-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${ECS_TASK_DEFINITION}" \
            --query taskDefinition \
            > task-definition.json

      - name: Update task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ needs.build-push.outputs.image-uri }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
