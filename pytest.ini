[pytest]
testpaths = tests
addopts = -ra --strict-markers --tb=short
markers =
    unit: fast, deterministic unit tests (default, no network)
    smoke: opt-in infrastructure connectivity checks (real creds needed)
    integration: end-to-end workflow tests using FakeListLLM + stubs
python_files = test_*.py
python_classes = Test_*
python_functions = test_*
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
