# AI_Powered_Last_Mile_Delivery_Automation — DVC pipeline stages

stages:
  data_ingestion:
    cmd: python src/AI_Powered_Last_Mile_Delivery_Automation/pipeline/stage_01_data_ingestion.py
    deps:
      - src/AI_Powered_Last_Mile_Delivery_Automation/pipeline/stage_01_data_ingestion.py
      - config/config.yaml
    outs:
      - artifacts/data_ingestion

  data_validation:
    cmd: python src/AI_Powered_Last_Mile_Delivery_Automation/pipeline/stage_02_data_validation.py
    deps:
      - src/AI_Powered_Last_Mile_Delivery_Automation/pipeline/stage_02_data_validation.py
      - artifacts/data_ingestion
    outs:
      - artifacts/data_validation

  data_transformation:
    cmd: python src/AI_Powered_Last_Mile_Delivery_Automation/pipeline/stage_03_data_transformation.py
    deps:
      - src/AI_Powered_Last_Mile_Delivery_Automation/pipeline/stage_03_data_transformation.py
      - artifacts/data_validation
    outs:
      - artifacts/data_transformation

  model_training:
    cmd: python src/AI_Powered_Last_Mile_Delivery_Automation/pipeline/stage_04_model_training.py
    deps:
      - src/AI_Powered_Last_Mile_Delivery_Automation/pipeline/stage_04_model_training.py
      - artifacts/data_transformation
    params:
      - params.yaml:
    outs:
      - artifacts/model_trainer

  model_evaluation:
    cmd: python src/AI_Powered_Last_Mile_Delivery_Automation/pipeline/stage_05_model_evaluation.py
    deps:
      - src/AI_Powered_Last_Mile_Delivery_Automation/pipeline/stage_05_model_evaluation.py
      - artifacts/model_trainer
    metrics:
      - artifacts/model_evaluation/metrics.json:
          cache: false
