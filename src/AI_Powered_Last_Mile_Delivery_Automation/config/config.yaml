text_splitter:
  chunk_size: 1500
  chunk_overlap: 300
  separators: ["\n\n", "\n", ". ", " ", ""]

embedding_model:
  provider: "huggingface"
  model_name: "sentence-transformers/all-MiniLM-L6-v2"

retriever:
  top_k: 5  # Number of top documents to retrieve based on similarity
  search_type: "mmr"  # Options: "similarity", "mmr", "similarity_score_threshold"
  # MMR (Maximal Marginal Relevance) parameters for diverse results
  fetch_k: 20  # Number of documents to fetch before MMR re-ranking (should be > top_k)
  lambda_mult: 0.5  # Diversity vs relevance (0=max diversity, 1=max relevance)

llm:
  gen_llm:
    provider: "openai"
    model_name: "gpt-4o-mini"
    temperature: 0

  eval_llm:
    provider: "openai"
    model_name: "gpt-4o"
    temperature: 0
# ──────────────────────────────────────────────────────────────────
# Secrets (API keys, ChromaDB credentials) are NO LONGER stored here.
# They must be provided via environment variables.  See .env.example
# for the full list of required variables.
# ──────────────────────────────────────────────────────────────────

# ──────────────────────────────────────────────────────────────────
# Server configuration (FastAPI backend + Streamlit frontend)
# ──────────────────────────────────────────────────────────────────
server:
  host: "0.0.0.0"
  port: 8080
  api_base_url: "http://localhost:8080"   # Used by Streamlit to reach the backend
  streamlit_port: 8501
  request_timeout_sec: 120                # Max time for a single /predict call